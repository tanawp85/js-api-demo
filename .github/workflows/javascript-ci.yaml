name: Javascript CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          repository: ${{ github.repository }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.4.0

      - name: Build Project
        run: |
          npm ci
          npm run build --if-present

      - name: Test Project
        run: npm test
